<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LEJ Portfolio</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="stylesheet"
      as="style"
      crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
    />
    <script src="js/script.js" defer></script>
  </head>
  <body>
    <section class="hero-shapes">
      <div class="shape shape-left"></div>
      <div class="shape shape-center"></div>
      <div class="shape shape-right"></div>
    </section>

    <section class="about">
      <div class="about-intro">
        <h2 class="fade-delay delay-1">
          안녕하세요,<br />
          UX/UI 디자이너 이은진 입니다.
        </h2>

        <p class="fade-delay delay-2">
          더 나은 사용자 경험은 작은 불편을 놓치지 않는 데서 시작된다고
          생각합니다.
        </p>
        <p class="fade-delay delay-3">
          저는 사용자의 흐름을 먼저 이해하고, 그에 맞는 구조와 화면을 차분히
          설계합니다.
        </p>

        <p class="fade-delay delay-4">
          감각적인 표현과 직관적은 사용성 사이의 균형을 고민하며,
        </p>

        <p class="fade-delay delay-5">
          보기 좋은 화면을 넘어 오래 기억에 남는 경험을 만들고자 합니다.
        </p>
      </div>

      <div class="about-content">
        <div class="profile-img">
          <img src="assets/images/eunjin.png" alt="프로필 이미지" />
        </div>

        <div class="education">
          <h3>EDUCATION</h3>

          <div class="edu-item"></div>
        </div>
      </div>
    </section>
  </body>
</html>
